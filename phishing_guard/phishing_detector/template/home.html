<!DOCTYPE html>
<html>
<head>
    <title>Phishing Guard API Test</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; font-size: 16px; box-sizing: border-box; }
        button { padding: 10px 20px; background: #333; color: white; border: none; cursor: pointer; font-size: 16px; border-radius: 4px; }
        button:hover { background: #555; }
        #result { margin-top: 20px; padding: 15px; border-radius: 8px; font-size: 18px; display: none; }
        .phishing { background: #ffebee; color: #c62828; border: 1px solid #c62828; }
        .legit    { background: #e8f5e9; color: #2e7d32; border: 1px solid #2e7d32; }
        .error    { background: #fff3e0; color: #e65100; border: 1px solid #e65100; }
    </style>
</head>
<body>
    <h1>Phishing Guard API Test</h1>
    <p>Test the Django backend directly</p>

    <input type="text" id="url-input" 
           placeholder="Enter URL to test..."
           value="http://paypal-login.verify.xyz/signin"/>
    <button onclick="checkUrl()">Check URL</button>

    <div id="result"></div>

    <script>
        async function checkUrl() {
            const url = document.getElementById('url-input').value;
            const resultDiv = document.getElementById('result');

            resultDiv.style.display = 'block';
            resultDiv.className = '';
            resultDiv.textContent = '⏳ Checking...';

            try {
                const response = await fetch('http://127.0.0.1:8000/analyze/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                const data = await response.json();
                console.log('Response:', data);

                if (data.error) {
                    resultDiv.className = 'error';
                    resultDiv.textContent = ` Error: ${data.error}`;
                    return;
                }

                if (data.is_phishing) {
                    resultDiv.className = 'phishing';
                    resultDiv.textContent = `PHISHING (${(data.confidence * 100).toFixed(2)}%)`;
                } else {
                    resultDiv.className = 'legit';
                    resultDiv.textContent = `LEGITIMATE (${(data.confidence * 100).toFixed(2)}%)`;
                }

            } catch (err) {
                resultDiv.className = 'error';
                resultDiv.textContent = `Cannot connect: ${err.message}`;
            }
        }

        // Allow pressing Enter to check
        document.getElementById('url-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkUrl();
        });
    </script>
</body>
</html>
